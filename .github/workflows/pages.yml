# Publishes the browser/ UI to GitHub Pages on every push to main.
# The page runs standalone (Titles & branding) and unlocks the Edit mode when
# it detects the local engine at 127.0.0.1:17870.
name: Deploy web app to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: browser
      - id: deployment
        uses: actions/deploy-pages@v4
